<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор тестов по биологии</title>
    <!-- Подключаем внешние стили -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Кнопка переключения темы -->
<button id="theme-toggle" class="theme-btn" aria-label="Переключить тему">🌙 Темная тема</button>

<div class="container">
    <h1>Генератор тестов</h1>

    <!-- Экран загрузки файла -->
    <div id="upload-box" class="file-select">
        <div id="restore-badge" class="badge" style="display: none;">Обнаружен незавершенный тест! Восстанавливаем...</div>
        <p>Для начала выберите ваш текстовый или .md файл с вопросами</p>
        <label for="file-input">Выбрать файл</label>
        <input type="file" id="file-input" accept=".txt,.md">
        <p id="file-name" style="margin-top: 10px; font-size: 0.9rem; color: gray;"></p>
    </div>

    <!-- Экран самого теста -->
    <div id="quiz-box" class="question-box">
        <div style="display: flex; justify-content: space-between; font-size: 0.9rem; color: gray; margin-bottom: 5px;">
            <span id="question-counter">Вопрос 1 из 20</span>
            <span id="score-counter">Правильно: 0</span>
        </div>
        <div class="progress-bar"><div id="progress" class="progress-fill"></div></div>
        
        <div id="question-text" class="question-text">Текст вопроса</div>
        <ul id="options-list" class="options-list"></ul>
        
        <button id="next-btn" class="btn">Следующий вопрос</button>
        <button onclick="resetQuiz()" class="btn btn-danger">Начать новый тест (сбросить прогресс)</button>
    </div>

    <!-- Экран итогов -->
    <div id="result-box">
        <h2>Тест завершен!</h2>
        <p>Ваш результат:</p>
        <div id="final-score" class="score">0 / 20</div>
        <p id="result-comment"></p>
        <button onclick="resetQuiz()" class="btn">Начать новый тест</button>
    </div>
</div>

<!-- Подключаем логику скрипта -->
<script src="script.js"></script>
</body>
</html>

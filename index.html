<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор тестов</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<button id="theme-toggle" class="theme-btn" aria-label="Переключить тему">🌙 Темная тема</button>

<div class="container">
    <h1>Генератор тестов</h1>

    <!-- Экран загрузки и выбора файлов -->
    <div id="upload-box" class="file-select">
        <div id="restore-badge" class="badge" style="display: none;">Обнаружен незавершенный тест! Восстанавливаем...</div>
        
        <p>Загрузите новый текстовый или .md файл с вопросами:</p>
        <label for="file-input">Загрузить файл</label>
        <input type="file" id="file-input" accept=".txt,.md">
        
        <!-- Библиотека сохраненных тестов -->
        <div class="library-container">
            <h3>Ваша библиотека тестов:</h3>
            <ul id="saved-files-list" class="files-list">
                <!-- Сюда JavaScript добавит сохраненные файлы -->
            </ul>
        </div>
    </div>

    <!-- Новое: Экран настройки генерации (выбор количества вопросов) -->
    <div id="setup-box" class="setup-box" style="display: none;">
        <h3>Настройка теста</h3>
        <p id="total-available-text">Всего доступно вопросов в файле: 0</p>
        
        <div class="setup-field">
            <label for="quiz-count-select">Количество вопросов в тесте:</label>
            <select id="quiz-count-select">
                <!-- Опции сгенерирует JS динамически -->
            </select>
        </div>
        
        <button id="start-quiz-btn" class="btn">Начать тестирование 🚀</button>
        <button onclick="cancelSetup()" class="btn btn-danger">Назад в меню</button>
    </div>

    <!-- Экран самого теста -->
    <div id="quiz-box" class="question-box">
        <div style="display: flex; justify-content: space-between; font-size: 0.9rem; color: gray; margin-bottom: 5px;">
            <span id="question-counter">Вопрос 1 из 20</span>
            <span id="score-counter">Правильно: 0</span>
        </div>
        <div class="progress-bar"><div id="progress" class="progress-fill"></div></div>
        
        <div id="question-text" class="question-text">Текст вопроса</div>
        <ul id="options-list" class="options-list"></ul>
        
        <button id="next-btn" class="btn">Следующий вопрос</button>
        <button onclick="resetQuiz()" class="btn btn-danger">Выйти в меню (сбросить прогресс)</button>
    </div>

    <!-- Экран итогов -->
    <div id="result-box">
        <h2>Тест завершен!</h2>
        <p>Ваш результат:</p>
        <div id="final-score" class="score">0 / 20</div>
        <p id="result-comment"></p>
        <button onclick="resetQuiz()" class="btn">Вернуться в меню</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
